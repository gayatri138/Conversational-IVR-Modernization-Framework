<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRCTC Smart IVR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 700px;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1d3557;
        }

        .start-box {
            text-align: center;
            margin-bottom: 15px;
        }

        .chat-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            height: 320px;
            overflow-y: auto;
            background: #fdfdfd;
            margin-bottom: 15px;
            white-space: pre-line;
        }

        .msg {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.6;
            white-space: pre-line;
        }

        .bot {
            background: #e8f0fe;
            color: #1d3557;
        }

        .user {
            background: #d1f7d6;
            margin-left: auto;
            text-align: right;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #1d3557;
            color: white;
            font-weight: bold;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
        }

        .key {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 24px;
            background: #457b9d;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>IRCTC Smart IVR</h1>

    <div class="start-box">
        <button onclick="startCall()">📞 Start IVR</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="Type or speak here...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startSpeech()">🎤</button>
    </div>

    <div class="keypad">
        <button class="key" onclick="quickSend('1')">1</button>
        <button class="key" onclick="quickSend('2')">2</button>
        <button class="key" onclick="quickSend('3')">3</button>
        <button class="key" onclick="quickSend('4')">4</button>
        <button class="key" onclick="quickSend('5')">5</button>
        <button class="key" onclick="quickSend('6')">6</button>
        <button class="key" onclick="quickSend('7')">7</button>
        <button class="key" onclick="quickSend('8')">8</button>
        <button class="key" onclick="quickSend('9')">9</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("userInput");
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
};

    function addMessage(text, sender) {
        const msg = document.createElement("div");
        msg.classList.add("msg", sender);
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }


    function speakText(text) {
    window.speechSynthesis.cancel();  // stop old speech if any

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;

    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        speech.voice = voices.find(v => v.lang.includes("en")) || voices[0];
    }

    window.speechSynthesis.speak(speech);
}

    async function startCall() {
    chatBox.innerHTML = "";

    // small silent speech to unlock audio on browser
    const unlock = new SpeechSynthesisUtterance(" ");
    window.speechSynthesis.speak(unlock);

    const res = await fetch("/welcome");
    const data = await res.json();
    addMessage(data.text, "bot");

    setTimeout(() => {
        speakText(data.speech);
    }, 500);
}

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        const res = await fetch("/ivr", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        const data = await res.json();
        addMessage(data.text, "bot");
        speakText(data.speech);
    }

    function quickSend(option) {
        input.value = option;
        sendMessage();
    }

    function startSpeech() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-IN";
        recognition.start();

        recognition.onresult = function(event) {
            input.value = event.results[0][0].transcript;
            sendMessage();
        };
    }
</script>
</body>
</html>
